<!DOCTYPE html>
<html>
<head>
    <title>ReliefLink</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            background: white;
            width: 320px;
            margin: 80px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: white;
            margin-top: 30px;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px;
            width: 95%;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<h1>ReliefLink</h1>

<div class="container">
    <h3>Volunteer Allocation</h3>

    <form action="/allocate" method="post">
        
       <select name="location">
    <option>Hazratganj</option>
    <option>Chinhat</option>
    <option>Rajajipuram</option>
    <option>Matiyari</option>
</select>

        <select name="type">
            <option>Medical</option>
            <option>Food</option>
            <option>Rescue</option>
            <option>Transport</option>
        </select>

        <input type="number" name="count" placeholder="Volunteers Needed">

        <input type="number" name="urgency" placeholder="Urgency (1-5)" min="1" max="5">

        <button type="submit">Allocate</button>
    </form>
</div>

</body>
</html>
